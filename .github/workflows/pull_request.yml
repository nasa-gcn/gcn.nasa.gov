name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CI: true
  ARC_TABLES_PORT: 8000
  ARC_DB_EXTERNAL: true

jobs:
  node:
    uses: nasa-gcn/.github/.github/workflows/node.yml@main
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Pull Latest docker image
        run: docker pull amazon/dynamodb-local:latest
      - name: Create test credentials
        run: |
          mkdir $HOME/.aws
          echo -e "[default]\naws_access_key_id=fakeTestString\naws_secret_access_key=fakeTestString\naws_session_token=fakeTestString" > $HOME/.aws/credentials
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
